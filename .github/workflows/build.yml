name: build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        target:
          # - win64
          # - macos64
          # - linux64
          # - android
          - ios
        sanitizer:
          - none
          - asan-ubsan
        include:
          # - target: win64
          #   os: ubuntu-latest
          # - target: macos64
          #   os: macos-latest
          # - target: linux64
          #   os: ubuntu-latest
          # - target: android
          #   os: ubuntu-latest
          - target: ios
            os: macos-latest

    env:
      ARTIFACT_NAME: dawn-static-${{ matrix.target }}${{ matrix.sanitizer == 'asan-ubsan' && '-asan-ubsan' || '' }}

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Android NDK
        if: matrix.target == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install depot_tools
        shell: bash
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: Cache windows sdk
        id: cache-windows-sdk
        if: matrix.target == 'win64'
        uses: actions/cache@v4
        with:
          path: .xwin-cache
          key: xwin-cache

      - name: Download windows sdk
        if: matrix.target == 'win64' && steps.cache-windows-sdk.outputs.cache-hit != 'true'
        run: |
          curl -L https://github.com/Jake-Shadle/xwin/releases/download/0.6.7/xwin-0.6.7-x86_64-unknown-linux-musl.tar.gz > $HOME/xwin.tar.gz
          tar -xvf $HOME/xwin.tar.gz -C $HOME
          sudo mv $HOME/xwin-0.6.7-x86_64-unknown-linux-musl/xwin /usr/bin
          xwin --accept-license splat --include-debug-libs

      - name: Install ninja (linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install ninja-build

      - name: Install ninja (macos)
        if: matrix.os == 'macos-latest'
        run: |
          brew install ninja

      - name: Install windows dependencies
        if: matrix.target == 'win64'
        run: |
          sudo apt-get install clang-19 clang-tools-19 llvm-19 lld-19 p7zip-full

      - name: Fetch Windows compiler-rt for ASan
        if: matrix.target == 'win64' && matrix.sanitizer == 'asan-ubsan'
        run: |
          # The ubuntu LLVM package doesn't have the windows compiler-rt libraries.
          # We download the official LLVM windows installer, extract it, and graft the libraries.
          curl -L "https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.0/LLVM-19.1.0-win64.exe" -o llvm.exe
          7z x llvm.exe -o"$HOME/llvm-win"
          sudo mkdir -p /usr/lib/llvm-19/lib/clang/19/lib/windows
          find "$HOME/llvm-win" -type d -name "windows" | grep "lib/clang" | xargs -I {} sudo cp -r {}/. /usr/lib/llvm-19/lib/clang/19/lib/windows/

      - name: Install linux dependencies
        if: matrix.target == 'linux64'
        run: |
          sudo apt-get install clang libxrandr-dev libxinerama-dev libx11-dev libxcursor-dev libxi-dev \
            libxext-dev libxcb-shm0-dev libxtst-dev libx11-xcb-dev

      - name: Setup cmake toolchain for windows
        if: matrix.target == 'win64'
        run: |
          echo "CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/cmake/WinMsvc.cmake" >> $GITHUB_ENV
          echo "LLVM_NATIVE_TOOLCHAIN=/usr/lib/llvm-19" >> $GITHUB_ENV
          echo "XWIN_CACHE=${{ github.workspace }}/.xwin-cache" >> $GITHUB_ENV

      - name: Build dawn
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          ENABLE_SANITIZERS: ${{ matrix.sanitizer == 'asan-ubsan' && '1' || '0' }}
        run: |
          EXTRA_CMAKE_ARGS=""
          
          if [ "${{ matrix.target }}" == "win64" ]; then
            EXTRA_CMAKE_ARGS="-DDAWN_FORCE_SYSTEM_COMPONENT_LOAD=ON"
          fi

          if [ "${{ matrix.target }}" == "macos64" ]; then
            EXTRA_CMAKE_ARGS="-DCMAKE_OSX_ARCHITECTURES=x86_64;arm64"
          fi

          if [ "${{ matrix.target }}" == "ios" ]; then
            EXTRA_CMAKE_ARGS="-DCMAKE_SYSTEM_NAME=iOS \
              -DCMAKE_OSX_ARCHITECTURES=arm64 \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0"
          fi

          if [ "${{ matrix.target }}" == "android" ]; then
             EXTRA_CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
               -DANDROID_ABI=arm64-v8a \
               -DANDROID_PLATFORM=android-30 \
               -DDAWN_USE_X11=OFF \
               -DDAWN_USE_WAYLAND=OFF \
               -DTINT_BUILD_SPV_READER=ON"
          fi
          
          ./scripts/build $EXTRA_CMAKE_ARGS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            build/gen/**/*
            build/lib/**/*

  release:
    runs-on: ubuntu-latest
    needs: build
    if: success() && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Create git tag
        id: create-git-tag
        run: |
          tag="autobuild-$(date -u '+%Y-%m-%d-%H-%M')"
          git tag $tag
          git push origin $tag
          echo "TAG=$tag" >> $GITHUB_OUTPUT
          echo "COMMIT=$(git --git-dir dawn/.git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Prepare artifacts
        run: |
          for target in win64 macos64 linux64 android ios; do
            for san in "" "-asan-ubsan"; do
              dir="dawn-static-${target}${san}"
              if [ -d "$dir" ]; then
                echo "${{ steps.create-git-tag.outputs.COMMIT }}" > "$dir/COMMIT"
                tar -czvf "${dir}.tar.gz" "$dir"/*
              fi
            done
          done

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.create-git-tag.outputs.TAG }} dawn-static-*.tar.gz \
            -n "dawn@${{ steps.create-git-tag.outputs.COMMIT }}"
